<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Showcase Cards</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Project Showcase Cards</h1>

    <p class="subtitle">
        Hover a project card to reveal details and actions.
    </p>

    <div class="projects">

        <div class="project-card">

            <div class="project-image">
                🚀
            </div>

            <div class="project-content">

                <h3>LaunchPad</h3>

                <p>
                    A modern startup dashboard with analytics and insights.
                </p>

                <div class="actions">

                    <button>Demo</button>
                    <button>GitHub</button>

                </div>

            </div>

        </div>

        <div class="project-card">

            <div class="project-image">
                🎨
            </div>

            <div class="project-content">

                <h3>DesignFlow</h3>

                <p>
                    Collaborative design platform for modern teams.
                </p>

                <div class="actions">

                    <button>Demo</button>
                    <button>GitHub</button>

                </div>

            </div>

        </div>

        <div class="project-card">

            <div class="project-image">
                ⚡
            </div>

            <div class="project-content">

                <h3>EaseMotion CSS</h3>

                <p>
                    Animation-first CSS framework with reusable UI patterns.
                </p>

                <div class="actions">

                    <button>Demo</button>
                    <button>GitHub</button>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
