<!-- 
  EaseMotion Component: Floating Orbit Popover
  Fully keyboard accessible without JavaScript via :focus-within 
-->
<div class="orbit-container">
  
  <!-- The trigger anchor -->
  <button class="orbit-trigger" aria-describedby="checkout-secure-popover">
    Secure Checkout
  </button>

  <!-- The orbital floating panel -->
  <div id="checkout-secure-popover" class="orbit-popover" role="tooltip">
    <h4 class="popover-header">SSL Encrypted Connection</h4>
    <p class="popover-body">
      Your payment credentials are fully encrypted and processed securely. We never store your CVV code.
    </p>
  </div>

</div>
